services:
  - type: web
    name: health-reminder-tracker-api
    runtime: python
    repo: https://github.com/Sandeepsrinivasan-14/Health-Reminder-Tracker
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CARETAKER_PHONE
        sync: false
