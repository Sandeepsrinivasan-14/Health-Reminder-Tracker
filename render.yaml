services:
  - type: web
    name: health-tracker-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run complete_patient_dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_URL
        value: https://health-reminder-tracker-1.onrender.com
